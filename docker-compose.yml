# ═══════════════════════════════════════════════════════════════
# docker-compose.yml — TaskFlow (ТЕСТОВАЯ ВЕРСИЯ)
# ═══════════════════════════════════════════════════════════════

services:

  taskflow:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: taskflow:test                  # Изменено: taskflow:latest -> taskflow:test
    container_name: taskflow_app_test     # Изменено: уникальное имя контейнера
    restart: unless-stopped

    ports:
      # Внешний порт 38701 (из безопасного диапазона) → контейнерный порт 3000
      - "38601:3000"                      # Изменено: 38601 -> 38701

    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: /app/data/taskflow.db
      SEED_ON_FIRST_RUN: "true"
      # Ссылки на тестовый порт
      BETTER_AUTH_URL: "http://192.168.99.101:38601"      # Изменено
      NEXT_PUBLIC_APP_URL: "http://192.168.99.101:38601"  # Изменено
      BETTER_AUTH_SECRET: "c3HobtgU/L0pl46ukoEyGyfFkuvXPg6+uDIGkTXLnF8="

    volumes:
      # Новый изолированный том для тестовой базы данных
      - taskflow_data_test:/app/data     # Изменено

    networks:
      - taskflow_net_test                # Изменено

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  caddy:
    image: caddy:2
    container_name: taskflow_caddy_test  # Изменено: уникальное имя контейнера
    restart: unless-stopped
    depends_on:
      - taskflow
    ports:
      # Тестовый HTTPS будет доступен по: https://taskflow.local:8444
      - "8444:443"                       # Изменено: 8443 -> 8444
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data_test:/data            # Изменено
      - caddy_config_test:/config        # Изменено
    networks:
      - taskflow_net_test                # Изменено

volumes:
  taskflow_data_test:
    name: taskflow_data_test             # Изменено
    driver: local

  caddy_data_test:
    name: caddy_data_test               # Изменено
    driver: local

  caddy_config_test:
    name: caddy_config_test             # Изменено
    driver: local

networks:
  taskflow_net_test:
    name: taskflow_net_test              # Изменено
    driver: bridge